name: CI
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: [self-hosted, gpu, cuda]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Build venv + install
        run: |
          python3 -m venv .venv
          .venv/bin/pip install -q --upgrade pip
          # Sibling local deps not on PyPI; runner is the linux box where
          # all garrick247 repos are cloned at /home/garrick/<repo>.
          .venv/bin/pip install -q -e /home/garrick/openptxas
          .venv/bin/pip install -q -e .
          echo "install OK"
      - name: Smoke import
        run: |
          .venv/bin/python -c "import opencuda; print('opencuda', getattr(opencuda, '__version__', '?'))"